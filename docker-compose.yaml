# Development docker-compose. Assuming the API folders are relative to this
# repository, point /etc/hosts to 127.0.0.1 for each UI hostname:
#   127.0.0.1  soil alpinesoc rewetflux soil-keycloak
# Then connect to http://soil:88, http://alpinesoc:88, or http://rewetflux:88

services:
  traefik:
    image: traefik:v3.6
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--core.defaultRuleSyntax=v2"
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "88:80"
      - "8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  soil-keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8888
      KC_HOSTNAME: soil-keycloak
      KC_HOSTNAME_PORT: 88
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    ports:
      - "8888:8888"
    volumes:
      - ./keycloak-realm-dev.json:/opt/keycloak/data/import/realm-export.json:ro
    labels:
      - "traefik.http.routers.soil-keycloak.rule=Host(`soil-keycloak`)"
      - "traefik.http.routers.soil-keycloak.priority=50"
      - "traefik.http.services.soil-keycloak.loadbalancer.server.port=8888"

  soil-api:
    build:
      context: ../soil-api
      dockerfile: Dockerfile.dev  # Uses the dockerfile containing cargo-watch
    environment:
      - DB_HOST=sensormap-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=psql
      - DB_NAME=postgres
      - DB_PREFIX=postgresql
      - KEYCLOAK_UI_ID=sensormap-frontend-local
      - KEYCLOAK_REALM=SOIL
      - KEYCLOAK_URL=http://soil-keycloak:8888/
      - KEYCLOAK_BROWSER_URL=http://soil-keycloak:88/
      - DEPLOYMENT=local
      - APP_NAME=soil-api
    ports:
      - 3005:3000
    depends_on:
        - sensormap-db
    volumes:
      - ../soil-api/src:/app/src
      - soil-api-data:/app/target  # Store builds in docker volume
      - ../soil-api/Cargo.toml:/app/Cargo.toml
      - ../soil-api/Cargo.lock:/app/Cargo.lock
      - ~/projects/personal/crudcrate:/crudcrate
      - ~/projects/personal/crudcrate:/crudcrate-derive
      - ../moisturevals/soil-sensor-toolbox:/moisturevals/soil-sensor-toolbox
      - ../soil-api/migration:/app/migration
    labels:
      - "traefik.http.routers.soil-api.rule=(Host(`soil`) || Host(`alpinesoc`) || Host(`rewetflux`)) && PathPrefix(`/api`)"
      - "traefik.http.services.soil-api.loadbalancer.server.port=3000"

  sensormap-ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    labels:
      - "traefik.http.routers.sensormap-ui.rule=Host(`soil`)"
      - "traefik.http.services.sensormap-ui.loadbalancer.server.port=5173"
    volumes:
      - ../sensormap-ui:/app

  alpinesoc-ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    labels:
      - "traefik.http.routers.alpinesoc-ui.rule=Host(`alpinesoc`)"
      - "traefik.http.services.alpinesoc-ui.loadbalancer.server.port=5173"
    volumes:
      - ../alpinesoc-ui:/app

  rewetflux-ui:
    build:
      context: ../rewetflux/rewetflux-ui
      dockerfile: Dockerfile.dev
    labels:
      - "traefik.http.routers.rewetflux-ui.rule=Host(`rewetflux`)"
      - "traefik.http.services.rewetflux-ui.loadbalancer.server.port=5173"
    volumes:
      - ../rewetflux/rewetflux-ui:/app

  sensormap-db:
    image: timescale/timescaledb-ha:pg16
    # command: >
    #   postgres
    #   -c log_destination=stderr
    #   -c logging_collector=off
    #   -c log_statement=all
    #   -c log_min_duration_statement=0
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=psql
      - POSTGRES_DB=postgres
    ports:
      - 5433:5432
    volumes:
      - sensormap-db-data:/var/lib/postgresql/data
volumes:
  sensormap-db-data:
  soil-api-data:
